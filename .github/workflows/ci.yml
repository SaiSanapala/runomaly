name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: investigator_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d investigator_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/investigator_test
      SNAPSHOTS_DIR: ${{ github.workspace }}/snapshots
      SAMPLE_DATA_DIR: ${{ github.workspace }}/sample_data
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install Python dependencies
        run: pip install -e ".[dev]"
      - name: Formatting
        run: black --check backend investigator
      - name: Linting
        run: ruff check backend investigator
      - name: Type checks
        run: mypy backend investigator
      - name: Migrate database
        run: alembic upgrade head
      - name: Run tests
        run: pytest backend/tests
      - name: Build frontend
        working-directory: frontend
        run: npm install && npm run build
      - name: Build Docker images
        run: docker compose build

